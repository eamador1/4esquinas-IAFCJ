      <img src="img/forma/call.svg" class="phone-image"><p class="phone-number">7797-3564</p>

        <label  for="email" class="label-email">Correo Electrónico</label>
        <input type="email" name="email" class="text-name" id="email" placeholder= "yo@ejemplo.com" required>
        <label for="msg" class="label-message">Mensaje</label>
        <textarea name="message" class="text-message" id= "msg" maxlength="600" placeholder= "Solicito Oración ..."></textarea>
